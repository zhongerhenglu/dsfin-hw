<script type="text/javascript">
	$(document).ready(function(){
		$(".queryArea").each(function() {
			$(this).keydown(function(e) {
				var $this = $(this);
	            var key = (e.keyCode) || (e.which) || (e.charCode);
	            if (key == "13"){//回车
	            	$this.next().click();
	            }
	        });
		});
	})
</script>
