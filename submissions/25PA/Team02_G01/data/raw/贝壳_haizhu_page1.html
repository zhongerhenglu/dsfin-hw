<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Captcha"/>
    <link rel="icon" href="//s1.ljcdn.com/hip-static/favicon.ico" type="image/x-icon"/>
    <link rel="stylesheet" href="//s1.ljcdn.com/hip-static/css/main.css">
    <title>CAPTCHA</title>
    <style>
        #captcha {
            width: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }

         
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);  
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);  
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
            padding: 16px;  
            overflow-y: auto;  
        }

         
        .modal-overlay.show {
            display: flex;
            opacity: 1;
            visibility: visible;
        }

         
        .modal-box {
            width: 100%;
            max-width: 420px;  
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            transform: translateY(-20px) scale(0.95);  
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            position: relative;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .modal-overlay.show .modal-box {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

         
        .modal-header {
            padding: 0 10px;  
            background: linear-gradient(135deg, #fef0f0 0%, #fee2e2 100%);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

         
        .error-icon {
            width: 28px;  
            height: 28px;
            background: #f56c6c;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(245, 108, 108, 0.2);
        }

         
        .modal-title {
            font-size: 18px;  
            color: #212529;
            font-weight: 600;
            letter-spacing: 0.1px;
        }

         
        .modal-body {
            padding: 20px;  
            color: #495057;
            font-size: 14px;  
            line-height: 2;  
            white-space: pre-line;
        }

         
        .modal-footer {
            padding: 12px 20px;  
            text-align: right;
            background: #f8f9fa;
            border-top: 1px solid #f1f3f5;
            display: flex;  
            justify-content: flex-end;
            gap: 8px;  
        }

         
        .modal-btn {
            padding: 10px 20px;  
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;  
            font-weight: 500;
            transition: all 0.3s ease;
            letter-spacing: 0.2px;
            min-width: 80px;  
            margin-left: 0;  
        }

         
        .confirm-btn {
            background: linear-gradient(135deg, #f56c6c 0%, #f78989 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(245, 108, 108, 0.2);
        }

        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(245, 108, 108, 0.3);
        }

        .confirm-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(245, 108, 108, 0.2);
        }

         
        .cancel-btn {
            background: #f8f9fa;
            color: #495057;
            border: 1px solid #e9ecef;
        }

        .cancel-btn:hover {
            background: #e9ecef;
            border-color: #dee2e6;
        }
    </style>
</head>
<body>
<div id="back-button">
    <img class="back-icon" src="//s1.ljcdn.com/hip-static/img/back.svg"/>
</div>

<div id="main">
    <div id="container">
        <img class="bg" src="//s1.ljcdn.com/hip-static/img/captcha.svg" alt="CAPTCHA">
        <div class="title">人机验证</div>
        
        <div id="captcha">
            <div id="loading-tip">加载中，请稍后...</div>
        </div>
    </div>
    <footer id="site-footer">
        <div class="footer-content">
            <img class="picture" src="//s1.ljcdn.com/hip-static/img/logo.png">
            <div class="copyright">
                &copy; 贝壳信息安全中心
            </div>
        </div>
        <div class="footer-beian">
            <a href="https://beian.miit.gov.cn/" rel="noreferrer" target="_blank">津ICP备18000836号-1</a>
            <img class="picture" src="//s1.ljcdn.com/hip-static/img/beian.png">
            <a href="http://www.beian.gov.cn/portal/registerSystemInfo?recordcode=12010602120282" rel="noreferrer"
               target="_blank">津公网安备 12010602120282号</a>
        </div>
    </footer>
</div>

<div class="modal-overlay" id="errorModal">
    <div class="modal-box">
        <div class="modal-header">
            <div class="error-icon">✕</div>
            <h3 class="modal-title">验证失败</h3>
        </div>
        <div class="modal-body" id="errorMessage"></div>
        <div class="modal-footer">
            <button class="modal-btn cancel-btn" id="cancelBtn">取消</button>
            <button class="modal-btn confirm-btn" id="confirmBtn">重新验证</button>
        </div>
    </div>
</div>
</body>
<script src="https://s1.ljcdn.com/captcha-js-sdk-v2/captcha-anti-spider.js"></script>
<script>
  window.captchaEndpoint = 'captcha.lianjia.com';
  window.hipPrefix = 'hip';
</script>
<script src="https://s1.ljcdn.com/m-base/release/v04.4/asset/bridge_d0b9f70cd88e0a5q.js"></script>
<script src="//s1.ljcdn.com/hip-static/js/validate.js"></script>
</html>
